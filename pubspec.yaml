name: fyp
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: ^3.10.4

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1    # For your UI/UX typography
  provider: ^6.1.1        # For managing User vs Admin roles
  http: ^1.2.0            # For connecting to your IoT/ML backend
  local_auth: ^2.3.0      # For the biometric login

dev_dependencies:
  flutter_test:
    sdk: flutter
  # The lint set provided by the package is activated in the analysis_options.yaml file.
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# 1. FIXED ICON CONFIGURATION
# To stop the zoom, we use a smaller image_ratio_android (0.6 is roughly 66%)
# This ensures the logo stays within the 'Safe Zone'.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.jpeg"
  image_ratio_android: 0.5
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.jpeg"

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is included.
  uses-material-design: true

  # 2. FIXED ASSETS REGISTRATION
  # You must register the folder so Flutter can find your app_icon.jpeg
  assets:
    - assets/icon/

  # To add custom fonts, uncomment and adjust the following:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic